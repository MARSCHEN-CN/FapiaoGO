<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>打印机设置卡片图标预览</title>
<style>
  :root { color-scheme: light; }
  body { margin: 0; padding: 40px; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background: #f4f4f5; color: #18181b; }
  h1 { font-size: 18px; font-weight: 600; }
  .row { display: flex; gap: 40px; align-items: center; margin: 28px 0; flex-wrap: wrap; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { font-size: 13px; color: #71717a; }

  /* 复刻 .printer-card-header-icon */
  .pill {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #4f7cff 0%, #6c8aff 100%);
    color: #fff; font-size: 13px; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(79,124,255,0.2);
  }
  .pill svg { width: 16px; height: 16px; fill: currentColor; }
  .pill.big { width: 64px; height: 64px; border-radius: 12px; }
  .pill.big svg { width: 40px; height: 40px; }

  .dark { color-scheme: dark; background: #1e1e22; color: #e6e6e6; }
  .dark .label { color: #9a9a9a; }
</style>
</head>
