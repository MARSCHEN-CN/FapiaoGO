# Electron Builder 配置
appId: com.marsprint.app
productName: MarsPrint
directories:
  output: release
  buildResources: resources
files:
  - "electron/**/*"
  - "!electron/node_modules/**/*"
  - "dist/**/*"
# 打包时额外资源（SumatraPDF）
extraResources:
  - from: resources/sumatra
    to: sumatra
# Windows 打包配置
win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
